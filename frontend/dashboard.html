<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard - AI Mock Interview</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body onload="(function(){ const u=getUser(); if(!u){location.href='index.html'; return;} document.getElementById('who').textContent=u.name; loadHistory(); })()">
  <div class="container">
    <div class="nav">
      <div class="brand">Dashboard</div>
      <div class="row" style="max-width:420px;">
        <div class="badge">Hi, <span id="who"></span></div>
        <button class="btn secondary" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Start New Interview</h2>
        <p>Select role and difficulty, then start.</p>
        <div id="dmsg" class="small" style="margin-bottom:10px;"></div>

        <label class="small">Interview Category</label>
        <select id="category">
          <option value="technical">💻 Technical Skills</option>
          <option value="behavioral">🤝 Behavioral</option>
          <option value="leadership">👔 Leadership</option>
          <option value="problemsolving">🧩 Problem Solving</option>
        </select>
        <div style="height:10px;"></div>

        <label class="small">Job Role</label>
        <select id="role">
          <option>Python Developer</option>
          <option>Web Developer</option>
          <option>Java Developer</option>
          <option>Data Analyst</option>
          <option>QA Tester</option>
        </select>
        <div style="height:10px;"></div>

        <label class="small">Difficulty</label>
        <select id="difficulty">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
        <div style="height:12px;"></div>

        <button class="btn" onclick="startInterview()">Start Interview</button>
      </div>

      <div class="card">
        <h2>📊 Performance Analytics</h2>
        <p>Your interview performance overview.</p>
        <div id="analyticsBox" class="stats-grid">
          <div class="stat-card">
            <div class="stat-number" id="totalInterviews">0</div>
            <div class="stat-label">Total Interviews</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="avgScore">0</div>
            <div class="stat-label">Avg Score</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="bestScore">0</div>
            <div class="stat-label">Best Score</div>
          </div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:14px;">
      <h2>📝 Interview History</h2>
      <p>Your previous interview sessions.</p>
      <div id="historyBox" class="list"></div>
    </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
